services:
  imagentj:
    image: ${IMAGENTJ_IMAGE:-mmvlab/agentic_j_test:agent_j_cpu}
    # Do not pin platform here: Docker/BuildKit builds for the host architecture
    # by default, and the Dockerfile routes arch-specific steps via TARGETARCH.
    build:
      context: .
      dockerfile: ${IMAGENTJ_DOCKERFILE:-Dockerfile}
      target: cpu
    pull_policy: missing
    ports:
      # Bind to localhost only by default for security
      # Change to "0.0.0.0:6080:6080" if you need network access (not recommended)
      - "0.0.0.0:6080:6080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - FIJI_PATH=/opt/Fiji.app
      - QDRANT_DATA_PATH=/app/qdrant_data
      - DISPLAY=:1
      - PYTHONPATH=/app:/app/src:/app/extra_packages
      - PYTHONUNBUFFERED=1

    volumes:
      # Fiji plugin persistence — seeded from image on first run by entrypoint
      - fiji_plugins:/opt/Fiji.app/plugins
      - fiji_jars:/opt/Fiji.app/jars
      # DeepImageJ APPOSE framework environments (TF, PyTorch) — persisted so
      # they are created once on first model run and reused on every subsequent start
      - appose_envs:/opt/appose
      # Saved scripts persistence
      - saved_scripts:/app/scripts/saved_scripts
      # Qdrant vector database for plugin search and RAG.
      # Named volume auto-seeded from the image's baked-in /app/qdrant_data on
      # first start; persists user-ingested data across container restarts.
      - qdrant_data:/app/qdrant_data
      # Image data directory — place images in $IMAGE_DATA_DIR on host (default ./data),
      # access them in the container at /data and /app/data.
      - ${IMAGE_DATA_DIR:-./data}:/data
      - ${IMAGE_DATA_DIR:-./data}:/app/data
      # User home — persists api_keys.env (outside /app/data so agent can't read it)
      - imagentj_home:/home/imagentj
      # Cellpose models — named volume auto-seeded from baked-in models at
      # /home/imagentj/.cellpose/models. Cellpose downloads missing models on demand.
      - cellpose_models:/home/imagentj/.cellpose/models
    env_file:
      - path: .env
        required: false
    shm_size: '2gb'

    networks:
      - imagent_net

    # ── Resource limits ────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G

    # ── Security hardening ──────────────────────────────────────────────────
    # Run as non-root (also set in Dockerfile, belt-and-suspenders)
    user: "imagentj"
    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities — none are needed
    cap_drop:
      - ALL

volumes:
  fiji_plugins:
  fiji_jars:
  saved_scripts:
  appose_envs:
  imagentj_home:
  qdrant_data:
  cellpose_models:

networks:
  imagent_net:
    ipam:
      driver: default
      config:
        # Using 10.10.10.0/24 is usually safe from 172.x conflicts
        - subnet: 10.10.10.0/24
