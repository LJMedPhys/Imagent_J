# End-user compose file for the published Docker Hub image.
# Users only need this single file plus an optional .env for API keys.
#
# Usage:
#   1. Save this file as docker-compose.yml in an empty directory
#   2. (Optional) Create a .env file alongside it with API keys
#   3. docker compose pull && docker compose up
#   4. Open http://localhost:6080 in a browser
#
# Place input images in ./data on the host; they appear at /data inside the
# container.

services:
  imagentj:
    image: ${IMAGENTJ_IMAGE:-yourdockerhubuser/imagentj:latest}
    pull_policy: missing
    ports:
      - "0.0.0.0:6080:6080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-true}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-}
      - LANGCHAIN_CALLBACKS_BACKGROUND=${LANGCHAIN_CALLBACKS_BACKGROUND:-true}
      - VNC_PASSWORD=${VNC_PASSWORD:-}

    volumes:
      # Fiji plugin/jar persistence — auto-seeded from the image on first run
      - fiji_plugins:/opt/Fiji.app/plugins
      - fiji_jars:/opt/Fiji.app/jars
      # DeepImageJ APPOSE framework environments (TF, PyTorch)
      - appose_envs:/opt/appose
      # User-saved scripts
      - saved_scripts:/app/scripts/saved_scripts
      # Qdrant vector database (plugin search & RAG)
      - qdrant_data:/app/qdrant_data
      # User home — persists API keys written by the in-app setup wizard
      - imagentj_home:/home/imagentj
      # Cellpose models — downloaded on demand into this named volume
      - cellpose_models:/home/imagentj/.cellpose/models
      # Host-mounted data folder: drop input images here, find outputs here too
      - ${IMAGE_DATA_DIR:-./data}:/data

    env_file:
      - path: .env
        required: false

    shm_size: '2gb'

    networks:
      - imagent_net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G

    user: "imagentj"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  fiji_plugins:
  fiji_jars:
  saved_scripts:
  qdrant_data:
  appose_envs:
  imagentj_home:
  cellpose_models:

networks:
  imagent_net:
    ipam:
      driver: default
      config:
        - subnet: 10.10.10.0/24
